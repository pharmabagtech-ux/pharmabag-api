name: Build and Deploy API

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "prisma/**"
      - "Dockerfile"
      - "package*.json"

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 318890247225.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: pharmabag-api
  EKS_CLUSTER: pharmabag-cluster
  K8S_NAMESPACE: pharmabag

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY
          TAG=${{ steps.vars.outputs.image_tag }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Update deployment image
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:${{ needs.build-and-push.outputs.image_tag }}
          kubectl set image deployment/pharmabag-api pharmabag-api=$IMAGE -n $K8S_NAMESPACE
          kubectl set image deployment/pharmabag-api migrate=$IMAGE -n $K8S_NAMESPACE

      - name: Wait for rollout
        run: kubectl rollout status deployment/pharmabag-api -n $K8S_NAMESPACE --timeout=5m
