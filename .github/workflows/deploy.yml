name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync Project to EC2
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --exclude=".git" --exclude="node_modules"
          path: ./
          remote_path: /home/ubuntu/project-2-pharmabag-api/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/project-2-pharmabag-api

            npm ci
            
            npx prisma generate

            npx prisma migrate deploy
            
            npm run build

            pm2 restart pharmabag-api

            pm2 save

            echo "Pharmabag API deployed successfully."
